<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>合规检测风险报告 - 采购管理系统</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0078D4",
                        "background-light": "#F3F4F6",
                        "background-dark": "#111827",
                    },
                    fontFamily: {
                        display: ["Inter", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "4px",
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
        }
    </style>
</head>

<body class="bg-gray-200 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div
            class="bg-white dark:bg-gray-800 w-full max-w-6xl rounded-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="material-icons text-orange-500 text-xl">error_outline</span>
                    <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">合规检测</h2>
                </div>
                <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                    <span class="material-icons">close</span>
                </button>
            </div>
            <div
                class="px-6 py-4 bg-orange-50 dark:bg-orange-900/20 border-b border-orange-100 dark:border-orange-800/30 flex items-center justify-between">
                <div class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">
                    本次共完成 <span class="text-primary font-bold">X</span> 个业务风险项检测，通过 <span
                        class="text-green-600 font-bold">X</span> 个检测项，未通过 <span class="text-red-500 font-bold">Y</span>
                    个检测项，检测通过比例 <span class="text-primary font-bold">100%</span>。请确认是否继续操作？
                </div>
                <button
                    class="bg-primary hover:bg-blue-600 text-white px-4 py-1.5 rounded text-sm font-medium transition-all flex items-center gap-1 shadow-sm">
                    <span class="material-icons text-sm">download</span>
                    下载风险明细
                </button>
            </div>
            <div class="flex-1 overflow-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 z-10">
                        <tr class="bg-blue-50 dark:bg-gray-700 text-primary dark:text-blue-300 text-sm">
                            <th
                                class="px-6 py-3 font-semibold border-b border-blue-100 dark:border-gray-600 w-16 text-center whitespace-nowrap">
                                序号</th>
                            <th class="px-6 py-3 font-semibold border-b border-blue-100 dark:border-gray-600">风险预警名称
                            </th>
                            <th
                                class="px-6 py-3 font-semibold border-b border-blue-100 dark:border-gray-600 w-24 whitespace-nowrap">
                                检测结果</th>
                            <th class="px-6 py-3 font-semibold border-b border-blue-100 dark:border-gray-600">风险预警信息
                            </th>
                            <th class="px-6 py-3 font-semibold border-b border-blue-100 dark:border-gray-600">处置建议</th>
                        </tr>
                    </thead>
                    <tbody
                        class="text-sm text-gray-700 dark:text-gray-300 divide-y divide-gray-100 dark:divide-gray-700">
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                            <td class="px-6 py-4 text-center text-gray-400">1</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <span
                                        class="bg-orange-400 text-white text-[10px] px-2 py-0.5 rounded whitespace-nowrap flex items-center justify-center">预警</span>
                                    <span class="font-medium">劳务清单内容校验</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-gray-500">未通过</td>
                            <td class="px-6 py-4 leading-relaxed">本次劳务分包采购清单【清单名称】中存在机械设备：挖掘机</td>
                            <td class="px-6 py-4 leading-relaxed">建议删除本次采购清单【清单名称】中XX、YY行数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 dark:border-gray-700 flex justify-end gap-3">
                <button
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 dark:bg-gray-700 dark:hover:bg-gray-600 dark:text-gray-200 px-8 py-2 rounded font-medium shadow-md active:scale-95 transition-all">
                    取消
                </button>
                <button
                    class="bg-primary hover:bg-blue-600 text-white px-8 py-2 rounded font-medium shadow-md active:scale-95 transition-all">
                    确定
                </button>
            </div>
        </div>
    </div>

</body>

</html>
