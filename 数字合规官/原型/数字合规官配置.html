<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>集采运营后台 - 数字合规官配置</title>
  
  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 以在浏览器中编译 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 dayjs -->
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  
  <!-- 引入 Ant Design 样式和组件库 -->
  <link rel="stylesheet" href="https://unpkg.com/antd@5.15.0/dist/reset.css" />
  <script src="https://unpkg.com/antd@5.15.0/dist/antd.min.js"></script>
  
  <!-- 引入 Ant Design Icons -->
  <script src="https://unpkg.com/@ant-design/icons@5.3.1/dist/index.umd.js"></script>

  <style>
    body, html, #root {
      height: 100%;
      margin: 0;
      background-color: #f0f2f5;
    }
    .logo-container {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      border-right: 1px solid #f0f0f0;
      font-size: 18px;
      font-weight: bold;
      color: #000;
    }
    .logo-icon {
      color: #1677ff;
      font-size: 24px;
      margin-right: 10px;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 100%;
      padding: 0 24px;
      background: #fff;
    }
    .filter-card {
      margin-bottom: 16px;
      border-radius: 4px;
    }
    .filter-title {
      font-weight: bold;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
    }
    .filter-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 14px;
      background-color: #1677ff;
      margin-right: 8px;
      border-radius: 2px;
    }
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .avatar-preview {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
    }
    .avatar-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e6f4ff;
      color: #1677ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    /* 侧边栏菜单激活样式微调，使其更像截图 */
    .ant-menu-light .ant-menu-item-selected {
      background-color: #e6f4ff;
      color: #1677ff;
      border-right: 3px solid #1677ff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { 
      Layout, Menu, Breadcrumb, Card, Form, Input, Button, Table, 
      Switch, Space, Tag, Popconfirm, message, Image, Avatar,
      Select, Radio, Checkbox, Upload, TreeSelect
    } = antd;
    const { 
      AppstoreOutlined, SolutionOutlined, FileTextOutlined, 
      ScheduleOutlined, CheckSquareOutlined, CarOutlined,
      ShopOutlined, AlertOutlined, ToolOutlined, PlusOutlined,
      BellOutlined, UserOutlined, DownOutlined, UploadOutlined
    } = icons;

    const { Header, Content, Sider } = Layout;

    // 模拟数据
    const initialData = [
      {
        id: '1',
        orgName: '北京总部-采购中心',
        scope: '本下级',
        systems: ['招投标系统', '合同系统'],
        personnel: ['张合规', '李风控'],
        avatar: 'https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg',
        updateTime: '2026-03-24 13:01:08',
        status: true,
        operator: 'jctest1',
      },
      {
        id: '2',
        orgName: '华东区分公司',
        scope: '本级',
        systems: ['招投标系统'],
        personnel: ['王小明'],
        avatar: '',
        updateTime: '2025-12-11 17:59:22',
        status: true,
        operator: 'admin',
      },
      {
        id: '3',
        orgName: '华南区分公司',
        scope: '本级',
        systems: ['合同系统'],
        personnel: ['赵法务'],
        avatar: '',
        updateTime: '2025-12-09 20:08:43',
        status: false,
        operator: 'admin',
      }
    ];

    // 组织树 mock 数据
    const treeData = [
      {
        value: 'org_1',
        title: '北京总部',
        children: [
          { value: 'org_1_1', title: '北京总部-采购中心' },
          { value: 'org_1_2', title: '北京总部-财务中心' },
        ],
      },
      {
        value: 'org_2',
        title: '华东区分公司',
      },
      {
        value: 'org_3',
        title: '华南区分公司',
      },
    ];

    // 人员 mock 数据
    const personnelOptions = [
      { label: '张合规 (采购商)', value: '张合规' },
      { label: '李风控 (采购商)', value: '李风控' },
      { label: '王小明 (采购商)', value: '王小明' },
      { label: '赵法务 (采购商)', value: '赵法务' },
      { label: '孙专员 (采购商)', value: '孙专员' },
    ];

    const App = () => {
      const [view, setView] = React.useState('list'); // 'list', 'add', 'edit'
      const [dataSource, setDataSource] = React.useState(initialData);
      const [editingRecord, setEditingRecord] = React.useState(null);
      const [viewingRecord, setViewingRecord] = React.useState(null); // 查看详情状态
      const [isModalOpen, setIsModalOpen] = React.useState(false); // 弹窗状态
      const [form] = Form.useForm();
      const [searchStatus, setSearchStatus] = React.useState('全部'); // 筛选状态

      // 处理状态切换
      const handleStatusChange = (checked, record) => {
        const newData = dataSource.map(item => {
          if (item.id === record.id) {
            return { ...item, status: checked };
          }
          return item;
        });
        setDataSource(newData);
        message.success(`已${checked ? '开启' : '关闭'}`);
      };

      // 处理删除
      const handleDelete = (id) => {
        setDataSource(dataSource.filter(item => item.id !== id));
        message.success('删除成功');
      };

      // 跳转到新增/编辑页
      const goForm = (record = null) => {
        if (record) {
          setEditingRecord(record);
          // 匹配树节点 value，这里简做处理，实际应该用唯一ID
          let orgValue = '';
          if (record.orgName === '北京总部-采购中心') orgValue = 'org_1_1';
          if (record.orgName === '华东区分公司') orgValue = 'org_2';
          if (record.orgName === '华南区分公司') orgValue = 'org_3';

          form.setFieldsValue({
            orgName: orgValue,
            scope: record.scope,
            systems: record.systems,
            personnel: record.personnel,
          });
          setView('edit');
        } else {
          setEditingRecord(null);
          form.resetFields();
          form.setFieldsValue({ scope: '本级' });
          setView('add');
        }
      };

      // 打开查看弹窗
      const openViewModal = (record) => {
        let orgValue = '';
        if (record.orgName === '北京总部-采购中心') orgValue = 'org_1_1';
        if (record.orgName === '华东区分公司') orgValue = 'org_2';
        if (record.orgName === '华南区分公司') orgValue = 'org_3';

        setViewingRecord({
            ...record,
            orgValue: orgValue
        });
        setIsModalOpen(true);
      };

      // 返回列表
      const goList = () => {
        setView('list');
      };

      // 提交表单
      const onFinish = (values) => {
        // 校验组织是否已存在配置 (简单模拟)
        const selectedOrgTitle = treeData.flatMap(d => [d, ...(d.children || [])]).find(n => n.value === values.orgName)?.title || values.orgName;
        
        if (view === 'add' && dataSource.some(item => item.orgName === selectedOrgTitle)) {
          message.error('该组织已存在配置，请勿重复添加，请返回列表页刷新后进行编辑操作。');
          return;
        }

        if (view === 'add') {
          const newRecord = {
            id: Date.now().toString(),
            orgName: selectedOrgTitle,
            scope: values.scope,
            systems: values.systems,
            personnel: values.personnel,
            avatar: '', // 简化处理头像上传
            updateTime: dayjs().format('YYYY-MM-DD HH:mm:ss'),
            status: true,
            operator: 'jctest1',
          };
          setDataSource([newRecord, ...dataSource]);
          message.success('保存成功');
        } else {
          const newData = dataSource.map(item => {
            if (item.id === editingRecord.id) {
              return {
                ...item,
                scope: values.scope,
                systems: values.systems,
                personnel: values.personnel,
                updateTime: dayjs().format('YYYY-MM-DD HH:mm:ss'),
                operator: 'jctest1',
              };
            }
            return item;
          });
          setDataSource(newData);
          message.success('更新成功');
        }
        goList();
      };

      const columns = [
        { title: '序号', dataIndex: 'index', key: 'index', render: (text, record, index) => index + 1, width: 80 },
        { title: '组织名称', dataIndex: 'orgName', key: 'orgName' },
        { 
          title: '配置范围', 
          dataIndex: 'scope', 
          key: 'scope',
          render: text => <Tag color={text === '本级' ? 'blue' : 'cyan'}>{text}</Tag>
        },
        { 
          title: '业务系统', 
          dataIndex: 'systems', 
          key: 'systems',
          render: systems => systems.join('，')
        },
        { 
          title: '合规人员', 
          dataIndex: 'personnel', 
          key: 'personnel',
          render: personnel => {
            if (!personnel || personnel.length === 0) return '-';
            if (personnel.length === 1) return personnel[0];
            return `${personnel[0]}等${personnel.length}人`;
          }
        },
        { 
          title: '合规官头像', 
          dataIndex: 'avatar', 
          key: 'avatar',
          render: avatar => avatar ? 
            <Image src={avatar} width={32} height={32} style={{ borderRadius: '50%', objectFit: 'cover' }} /> : 
            <div className="avatar-placeholder"><UserOutlined /></div>
        },
        { title: '更新时间', dataIndex: 'updateTime', key: 'updateTime' },
        { 
          title: '状态', 
          dataIndex: 'status', 
          key: 'status',
          render: (status, record) => (
            <Switch 
              checked={status} 
              onChange={(checked) => handleStatusChange(checked, record)} 
              checkedChildren="启用" 
              unCheckedChildren="禁用"
            />
          )
        },
        { title: '操作人', dataIndex: 'operator', key: 'operator' },
        {
          title: '操作',
          key: 'action',
          render: (_, record) => (
            <Space size="middle">
              <a onClick={() => openViewModal(record)}>查看</a>
              <a onClick={() => goForm(record)}>编辑</a>
              <Popconfirm title="确定要删除该配置吗？" onConfirm={() => handleDelete(record.id)}>
                <a style={{ color: '#ff4d4f' }}>删除</a>
              </Popconfirm>
            </Space>
          ),
        },
      ];

      return (
        <Layout style={{ minHeight: '100vh' }}>
          <Sider width={220} theme="light" style={{ borderRight: '1px solid #f0f0f0' }}>
            <div className="logo-container">
              <AppstoreOutlined className="logo-icon" />
              集采运营后台
            </div>
            <Menu
              mode="inline"
              defaultSelectedKeys={['digital-compliance']}
              defaultOpenKeys={['risk']}
              style={{ height: 'calc(100% - 60px)', borderRight: 0 }}
            >
              <Menu.Item key="1" icon={<AppstoreOutlined />}>分供商管理</Menu.Item>
              <Menu.Item key="2" icon={<SolutionOutlined />}>模板管理</Menu.Item>
              <Menu.SubMenu key="procurement" icon={<ShopOutlined />} title="采购过程">
                <Menu.Item key="p1">需求管理</Menu.Item>
              </Menu.SubMenu>
              <Menu.SubMenu key="config" icon={<AppstoreOutlined />} title="配置管理"></Menu.SubMenu>
              <Menu.SubMenu key="identity" icon={<UserOutlined />} title="身份管理"></Menu.SubMenu>
              <Menu.SubMenu key="solution" icon={<FileTextOutlined />} title="解决方案"></Menu.SubMenu>
              <Menu.SubMenu key="contract" icon={<FileTextOutlined />} title="合同管理"></Menu.SubMenu>
              <Menu.SubMenu key="plan" icon={<ScheduleOutlined />} title="采购计划管理"></Menu.SubMenu>
              <Menu.SubMenu key="perform" icon={<CheckSquareOutlined />} title="履约管理"></Menu.SubMenu>
              <Menu.SubMenu key="receive" icon={<CarOutlined />} title="收验货"></Menu.SubMenu>
              <Menu.SubMenu key="marketing" icon={<ShopOutlined />} title="营销管理"></Menu.SubMenu>
              <Menu.SubMenu key="risk-early" icon={<AlertOutlined />} title="风控预警"></Menu.SubMenu>
              <Menu.SubMenu key="tool" icon={<ToolOutlined />} title="运营工具"></Menu.SubMenu>
              
              <Menu.SubMenu key="risk" icon={<AlertOutlined />} title="风控预警中心">
                <Menu.Item key="field">字段配置</Menu.Item>
                <Menu.Item key="rule">规则配置</Menu.Item>
                <Menu.Item key="scene">场景管理</Menu.Item>
                <Menu.Item key="alert">预警配置</Menu.Item>
                <Menu.Item key="operate">运营管理</Menu.Item>
                <Menu.Item key="rule-manage">规则管理</Menu.Item>
                <Menu.Item key="notice">通知中心</Menu.Item>
                <Menu.Item key="log">日志中心</Menu.Item>
                <Menu.Item key="digital-compliance">数字合规官</Menu.Item>
              </Menu.SubMenu>
            </Menu>
          </Sider>
          <Layout>
            <Header style={{ padding: 0, background: '#fff', height: 60, lineHeight: '60px', borderBottom: '1px solid #f0f0f0' }}>
              <div className="header-content">
                <div>
                  <Breadcrumb style={{ display: 'inline-block' }}>
                    <Breadcrumb.Item>风控预警中心</Breadcrumb.Item>
                    <Breadcrumb.Item>数字合规官配置</Breadcrumb.Item>
                    {view !== 'list' && <Breadcrumb.Item>{view === 'add' ? '新增配置' : '编辑配置'}</Breadcrumb.Item>}
                  </Breadcrumb>
                </div>
                <div>
                  <Space size="large">
                    <span><BellOutlined /> 下载中心</span>
                    <span><Avatar size="small" icon={<UserOutlined />} style={{ backgroundColor: '#1677ff' }} /> jctest1 <DownOutlined style={{fontSize: '12px'}}/></span>
                  </Space>
                </div>
              </div>
            </Header>
            <Content style={{ margin: '24px' }}>
              {view === 'list' && (
                <>
                  <Card className="filter-card" bodyStyle={{ padding: '20px 24px' }}>
                    <div className="filter-title">查询</div>
                    <Form layout="inline">
                      <Form.Item label="组织名称">
                        <Input placeholder="请输入组织名称" style={{ width: 240 }} />
                      </Form.Item>
                      <Form.Item label="状态">
                        <Select 
                          value={searchStatus} 
                          onChange={setSearchStatus} 
                          style={{ width: 120 }}
                          options={[
                            { value: '全部', label: '全部' },
                            { value: '启用', label: '启用' },
                            { value: '禁用', label: '禁用' }
                          ]}
                        />
                      </Form.Item>
                      <Form.Item>
                        <Space>
                          <Button type="primary">查询</Button>
                          <Button>重置</Button>
                        </Space>
                      </Form.Item>
                    </Form>
                  </Card>
                  
                  <Card>
                    <div className="table-toolbar">
                      <div></div>
                      <Button type="primary" icon={<PlusOutlined />} onClick={() => goForm()}>新增配置</Button>
                    </div>
                    <Table 
                      columns={columns} 
                      dataSource={dataSource.filter(item => {
                        if (searchStatus === '启用') return item.status === true;
                        if (searchStatus === '禁用') return item.status === false;
                        return true;
                      })} 
                      rowKey="id" 
                      pagination={{
                        total: dataSource.length,
                        showTotal: (total, range) => `第 ${range[0]}-${range[1]} 条/总共 ${total} 条`,
                        defaultPageSize: 10,
                        showSizeChanger: true,
                        showQuickJumper: true,
                      }}
                    />
                  </Card>

                  <antd.Modal
                    title="查看数字合规官配置"
                    open={isModalOpen}
                    onCancel={() => setIsModalOpen(false)}
                    footer={[
                        <Button key="close" onClick={() => setIsModalOpen(false)}>关闭</Button>
                    ]}
                    width={600}
                  >
                    {viewingRecord && (
                        <Form layout="vertical" style={{ marginTop: 24 }}>
                            <div style={{ fontWeight: 'bold', marginBottom: 16, borderBottom: '1px solid #eee', paddingBottom: 8 }}>基本配置</div>
                            
                            <Form.Item label="组织名称">
                                <TreeSelect
                                    treeData={treeData}
                                    value={viewingRecord.orgValue}
                                    disabled
                                />
                            </Form.Item>

                            <Form.Item label="配置范围">
                                <Radio.Group value={viewingRecord.scope} disabled>
                                    <Radio value="本级">本级</Radio>
                                    <Radio value="本下级">本下级</Radio>
                                </Radio.Group>
                            </Form.Item>

                            <Form.Item label="业务系统">
                                <Checkbox.Group value={viewingRecord.systems} disabled>
                                    <Checkbox value="招投标系统">招投标系统</Checkbox>
                                    <Checkbox value="合同系统">合同系统</Checkbox>
                                </Checkbox.Group>
                            </Form.Item>

                            <Form.Item label="关联人员">
                                <Select
                                    mode="multiple"
                                    value={viewingRecord.personnel}
                                    disabled
                                    options={personnelOptions}
                                />
                            </Form.Item>

                            <div style={{ fontWeight: 'bold', marginBottom: 16, marginTop: 32, borderBottom: '1px solid #eee', paddingBottom: 8 }}>定制配置</div>

                            <Form.Item label="合规官头像">
                                {viewingRecord.avatar ? 
                                    <Image src={viewingRecord.avatar} width={64} height={64} style={{ borderRadius: '50%', objectFit: 'cover' }} /> : 
                                    <Avatar size={64} icon={<UserOutlined />} style={{ backgroundColor: '#e6f4ff', color: '#1677ff' }} />
                                }
                            </Form.Item>
                        </Form>
                    )}
                  </antd.Modal>
                </>
              )}

              {view !== 'list' && (
                <Card title={view === 'add' ? '新增数字合规官配置' : '编辑数字合规官配置'}>
                  <Form 
                    form={form} 
                    layout="vertical" 
                    onFinish={onFinish}
                    style={{ maxWidth: 600, margin: '0 auto' }}
                  >
                    <div style={{ fontWeight: 'bold', marginBottom: 16, borderBottom: '1px solid #eee', paddingBottom: 8 }}>基本配置</div>
                    
                    <Form.Item 
                      name="orgName" 
                      label="选择组织" 
                      rules={[{ required: true, message: '请选择组织' }]}
                    >
                      <TreeSelect
                        treeData={treeData}
                        placeholder="请选择组织"
                        allowClear
                        treeDefaultExpandAll
                        disabled={view === 'edit'}
                        showSearch
                        treeNodeFilterProp="title"
                      />
                    </Form.Item>

                    <Form.Item 
                      name="scope" 
                      label="配置范围" 
                      rules={[{ required: true, message: '请选择配置范围' }]}
                    >
                      <Radio.Group>
                        <Radio value="本级">本级</Radio>
                        <Radio value="本下级">本下级</Radio>
                      </Radio.Group>
                    </Form.Item>

                    <Form.Item 
                      name="systems" 
                      label="业务系统" 
                      rules={[{ required: true, message: '请至少选择一个业务系统' }]}
                    >
                      <Checkbox.Group>
                        <Checkbox value="招投标系统">招投标系统</Checkbox>
                        <Checkbox value="合同系统">合同系统</Checkbox>
                      </Checkbox.Group>
                    </Form.Item>

                    <Form.Item 
                      name="personnel" 
                      label="关联人员" 
                      extra="过滤条件：所属组织为当前配置组织，角色为【采购商】"
                      rules={[{ required: true, message: '请选择关联的合规人员' }]}
                    >
                      <Select
                        mode="multiple"
                        allowClear
                        placeholder="请选择合规人员 (支持搜索)"
                        options={personnelOptions}
                        showSearch
                        filterOption={(input, option) =>
                          (option?.label ?? '').toLowerCase().includes(input.toLowerCase())
                        }
                      />
                    </Form.Item>

                    <div style={{ fontWeight: 'bold', marginBottom: 16, marginTop: 32, borderBottom: '1px solid #eee', paddingBottom: 8 }}>定制配置</div>

                    <Form.Item label="合规官头像" name="avatar" extra="支持 jpg/png，大小 < 2MB。预留未来扩展区域。">
                      <Upload name="logo" action="/upload.do" listType="picture" maxCount={1}>
                        <Button icon={<UploadOutlined />}>点击上传图片</Button>
                      </Upload>
                    </Form.Item>

                    <Form.Item style={{ marginTop: 40, textAlign: 'center' }}>
                      <Space size="large">
                        <Button onClick={goList}>取消</Button>
                        <Button type="primary" htmlType="submit">保存</Button>
                      </Space>
                    </Form.Item>
                  </Form>
                </Card>
              )}
            </Content>
          </Layout>
        </Layout>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
